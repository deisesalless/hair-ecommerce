services:
  postgres:
    image: postgres:16-alpine
    container_name: meu-crud-postgres
    environment:
      POSTGRES_DB: hair-store
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: